<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>In this Project i am using array , pop,join,and call stack method</h1>
    <p id="do"></p>
    <p id="pop"></p>
    <p id="name"></p>
    <script>
        var studentname=[
        "haider","wasay","zainab","rubab","minahil"
        ];
        function showstudent(){
        document.getElementById("do").innerHTML=studentname[3]+".";}
        function removelast(){
        document.getElementById("pop").innerHTML=studentname.pop()+".";}
        function displayAll(){

        
        document.getElementById("name").innerHTML=studentname.join("/")+".";}

        function process(){
          showstudent();
          removelast();
          displayAll();

        }        process();


      
    </script>
</body>
</html>
