<!DOCTYPE html>
<html>
    <head><title>scope of variable</title></head>
    <body>
        <p>a function acess those variable that write inside function</p>
        <button onclick="myfunction()">Click me</button>
        <p id="demo"></p>
        <p id="demo1"></p>
        <script>
            var b=2;
            function myfunction(){
              var  a=5;
               document.getElementById("demo").innerHTML=b*a;
            }
            document.getElementById("demo").innerHTML=b;
            document.getElementById("demo1").innerHTML=a;
        </script>
    </body>
</html>
