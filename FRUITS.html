<!DOCTYPE html>
<html>
<head></head>
<body>
    <h2>Loops in JavaScript</h2>
    <p id="demo"></p>

    <script>
        var fruits = ["mango", "apple", "banana", "grape", "kiwi", "dragon fruit"];
        var text = "";
        var i;

        for (i = 0; i < fruits.length; i++) {
            text += fruits[i] + "<br>";
        }

        document.getElementById("demo").innerHTML = text;
    </script>
</body>
</html>
